pre-commit:
  jobs:
    - name: check-author
      run: |
        NAME=$(git config user.name)
        if [ "$NAME" != "GrantKlassy" ]; then
          echo "ERROR: git user.name is '$NAME' --- expected 'GrantKlassy'"
          echo "  git config user.name 'GrantKlassy'"
          echo "  git config user.email '28637437+GrantKlassy@users.noreply.github.com'"
          exit 1
        fi
    - name: update-badge
      run: task fix:badge
    #    - name: env-hygiene
    #      run: task check:env-hygiene
    - name: gitignore-baseline
      run: task check:gitignore-baseline
    - name: no-emdash
      run: |
        DASH=$(printf '\xe2\x80\x94')
        FIXED=""
        for f in $(git diff --cached --name-only --diff-filter=ACM); do
          if [ -f "$f" ] && grep -qI "$DASH" "$f"; then
            sed -i "s/$DASH/---/g" "$f"
            git add "$f"
            FIXED="$FIXED $f"
          fi
        done
        if [ -n "$FIXED" ]; then
          echo "Converted emdashes to --- and re-staged:"
          for f in $FIXED; do echo "  $f"; done
        fi
    - name: canary-verify
      run: |
        txt_staged=false
        asc_staged=false
        git diff --cached --name-only | grep -qx 'public/canary.txt' && txt_staged=true
        git diff --cached --name-only | grep -qx 'public/canary.txt.asc' && asc_staged=true
        if $txt_staged || $asc_staged; then
          if ! $txt_staged; then
            echo "ERROR: public/canary.txt.asc is staged but public/canary.txt is not."
            echo "  canary.txt and canary.txt.asc must be committed together."
            exit 1
          fi
          if ! $asc_staged; then
            echo "ERROR: public/canary.txt is staged but public/canary.txt.asc is not."
            echo "  canary.txt and canary.txt.asc must be committed together."
            echo "  Re-sign with: ./scripts/renew-canary.sh"
            exit 1
          fi
          STAGED_TXT=$(mktemp)
          STAGED_ASC=$(mktemp)
          trap 'rm -f "$STAGED_TXT" "$STAGED_ASC"' EXIT
          git show :public/canary.txt > "$STAGED_TXT"
          git show :public/canary.txt.asc > "$STAGED_ASC"
          if ! gpg --verify "$STAGED_ASC" "$STAGED_TXT" 2>/dev/null; then
            echo "ERROR: public/canary.txt.asc does not verify against staged public/canary.txt"
            echo "  The signature must be for the exact staged content."
            echo "  Re-sign with: ./scripts/renew-canary.sh"
            exit 1
          fi
        fi
    # prettier runs LAST so no-emdash / update-badge / canary-resign can't
    # leave the tree unformatted. `--- ` replacements lengthen lines, which
    # shifts prettier's wrap points; running prettier after the mutations
    # guarantees the staged result matches `pnpm format:check` (which is
    # what `task ship` gates on).
    - name: prettier-write
      run: pnpm prettier --write --ignore-unknown {staged_files}
      stage_fixed: true

commit-msg:
  jobs:
    - name: no-coauthor
      run: |
        if grep -qi "co-authored-by" {1}; then
          echo "ERROR: Co-Authored-By trailer detected --- not allowed in grantklassy repos"
          exit 1
        fi

pre-push:
  jobs:
    - name: repo-standards
      run: task check
