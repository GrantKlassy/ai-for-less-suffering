version: "3"

tasks:
  ship:
    desc: Pre-deploy gate + signed ship tag + push. Kills gpg-agent so the tag signs with a fresh passphrase --- shipping is a deliberate human act.
    cmds:
      - task: check
      - task: site:check
      - task: engine:test
      - task: build
      - gpgconf --kill gpg-agent 2>/dev/null || true
      - git tag -s "ship/$(date -u +%Y%m%dT%H%M%SZ)" -m "ship"
      - git push --follow-tags

  check:
    desc: Run all standard repo checks
    cmds:
      - task: check:author
      - task: check:readme
      - task: check:license
      - task: check:history
      - task: check:last-updated
      - task: check:canary
      - task: check:layering
      - task: engine:check
      - task: site:test

  check:author:
    desc: Verify git identity is GrantKlassy
    cmds:
      - |
        NAME=$(git config user.name)
        if [ "$NAME" != "GrantKlassy" ]; then
          echo "ERROR: git user.name is '$NAME' --- expected 'GrantKlassy'"
          exit 1
        fi
        echo "OK: git user.name is GrantKlassy"

  check:readme:
    desc: Verify README.md exists
    cmds:
      - |
        if [ ! -f README.md ]; then
          echo "ERROR: README.md missing"
          exit 1
        fi
        echo "OK: README.md exists"

  check:license:
    desc: Verify LICENSE.txt exists
    cmds:
      - |
        if [ ! -f LICENSE.txt ]; then
          echo "ERROR: LICENSE.txt missing"
          exit 1
        fi
        echo "OK: LICENSE.txt exists"

  check:history:
    desc: Verify no Co-Authored-By in git history
    cmds:
      - |
        COUNT=$(git log --all --grep="Co-Authored-By" --oneline | wc -l)
        if [ "$COUNT" -gt 0 ]; then
          echo "ERROR: $COUNT commits contain Co-Authored-By trailers"
          git log --all --grep="Co-Authored-By" --oneline
          exit 1
        fi
        echo "OK: no Co-Authored-By contamination"

  check:last-updated:
    desc: Verify README "Code last updated" badge matches the most recent substantive commit
    cmds:
      - ~/git/grantklassy/tools/update-last-updated --check .

  check:layering:
    desc: Cross-layer invariant --- CAMP_EMOJI in src/lib/graph.ts stays in sync with data/camps/ (missing/stale both fail)
    dir: engine
    cmds:
      - uv run pytest tests/test_layering.py -q

  check:canary:
    desc: Verify canary.txt signature is valid (catches stale signatures from edits without re-sign)
    cmds:
      - |
        if [ ! -f public/canary.txt ] || [ ! -f public/canary.txt.asc ]; then
          echo "ERROR: canary files missing"
          exit 1
        fi
        if ! gpg --verify public/canary.txt.asc public/canary.txt 2>&1 | grep -q "Good signature"; then
          echo "ERROR: canary signature does not verify --- canary.txt was modified without re-signing"
          echo "  fix: task canary:renew"
          exit 1
        fi
        echo "OK: canary signature verifies"

  fix:badge:
    desc: Write the README "Code last updated" badge and stage it (pre-commit flow --- uses staged files to predict substantivity)
    cmds:
      - ~/git/grantklassy/tools/update-last-updated --pre-commit .
      - |
        if [ -f README.md ]; then
          git add README.md
        fi

  canary:renew:
    desc: Rewrite canary.txt with today's date + current BTC block, sign, verify
    cmds:
      - scripts/renew-canary.sh

  dev:
    desc: Run the Astro dev server with HMR (http://localhost:4321)
    cmds:
      - pnpm dev

  build:
    desc: Build the Astro site to dist/
    cmds:
      - pnpm build

  preview:
    desc: Preview the built site locally
    cmds:
      - pnpm preview

  site:check:
    desc: Astro TypeScript check and prettier format check
    cmds:
      - pnpm check
      - pnpm format:check

  site:test:
    desc: Run vitest unit tests (src/**/*.test.ts)
    cmds:
      - pnpm test

  site:verify-rendered:
    desc: Build the site, then re-run vitest so rendered-HTML tests (dist/index.html) actually fire
    cmds:
      - task: build
      - pnpm test

  engine:install:
    desc: Install Python engine dependencies via uv
    dir: engine
    cmds:
      - uv sync

  engine:test:
    desc: Run engine pytest suite
    dir: engine
    cmds:
      - uv run pytest

  engine:check:
    desc: Lint (ruff) and typecheck (mypy) the engine
    dir: engine
    cmds:
      - uv run ruff check .
      - uv run mypy afls

  engine:cli:
    desc: Run the afls CLI (pass args after -- , e.g. task engine:cli -- --help)
    dir: engine
    cmds:
      - uv run afls {{.CLI_ARGS}}
