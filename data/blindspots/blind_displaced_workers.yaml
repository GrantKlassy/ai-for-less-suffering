reasoning: An operator optimizing for sovereign flourishing tends to model
  displacement as a skill-transition problem. The displaced-workers camp holds
  that the dignity loss is not fungible with retraining and the felt suffering
  is not reducible to income statistics. An operator who codes this as
  'transitional friction' is already wrong about the shape of the harm, not
  merely its magnitude.
