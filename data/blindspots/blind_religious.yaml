reasoning: The operator model frames suffering in EV and individual-choice
  terms. Religious framings (dignity, meaning, suffering-with-purpose) are
  underweighted because they do not dissolve into EV calculations. This does
  not imply the religious camp is correct. It implies the operator risks
  missing suffering that does not appear in the optimization target at all,
  which is a different class of error than being wrong on the weights.
