translation: 'Open-weights treats closed-lab capability concentration as the dominant
  structural harm; x-risk treats unaligned frontier capability as the dominant catastrophic
  harm. Zone of overlap: both camps reject Anthropic''s ''trust the lead lab'' frame.
  They disagree on which direction of release posture reduces the dominant harm, but
  they share the premise that the current closed-lab oligopoly is not self-legitimating.'
