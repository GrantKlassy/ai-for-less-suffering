caveats:
- Mainstream animal welfare (norm_animal_sentience) is a scale/neglectedness argument;
  the pause-AI-for-animals argument is a narrower Bay Area subset.
- x-risk does not necessarily accept animal sentience as a dominant term and may treat
  it as a side-constraint rather than a primary objective.
