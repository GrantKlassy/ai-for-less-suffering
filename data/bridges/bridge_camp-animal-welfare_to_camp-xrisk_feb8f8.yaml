translation: 'Dickens'' argument (desc_dickens_pause_ai_animal_welfare_time_benefit)
  gives animal welfare a direct alignment with x-risk''s halt option: longer development
  timelines buy time to load animal-welfare values into AGI training regimes, because
  post-training techniques may not scale to superintelligence. Animal welfare thus
  has a *non-consequentialist-on-humans* reason to support x-risk''s policy output.'
