caveats:
- Content creators' claim rests on authorship rights; displaced workers' claim rests
  on dignity-in-role. These are different normative objects and the remedies can diverge
  (licensing market vs. collective bargaining).
- A policy that routes royalties to rights-holders does nothing for workers who never
  held a copyright to their labor.
