translation: 'Both camps locate harm at the training-data/input layer rather than
  at the output. Displaced workers: labor inputs to Meta''s employee-surveillance-for-agent-training.
  Content creators: authored work ingested without consent. The shared frame is ''extraction
  without meaningful consent at the substrate,'' which lets both camps back the same
  licensing/opt-out/worker-data-governance regime from different grounds.'
