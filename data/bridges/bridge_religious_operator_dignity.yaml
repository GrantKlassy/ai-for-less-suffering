caveats:
- Religious dignity rests on imago-dei, soul, or created-order claims. Operator
  sovereignty rests on no metaphysics. The shared conclusion does not imply
  shared premises.
- The bridge breaks on end-of-life and reproductive autonomy. Operator camps
  accept acts that religious camps treat as category violations. The
  translation holds for the locus-of-moral-weight question and nothing downstream
  of it.
