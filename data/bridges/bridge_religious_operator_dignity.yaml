translation: The religious human-dignity frame maps onto the operator camp's
  sovereignty claim at one specific point. Both hold that the individual person
  is the locus of moral weight, and neither trusts institutions to substitute
  their judgment for the person's own. That is the entire overlap. It is load-
  bearing when the question is 'who decides,' and it is useless for any
  question downstream of that.
