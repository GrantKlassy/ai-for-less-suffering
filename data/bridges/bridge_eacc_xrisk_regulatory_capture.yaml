translation: e/acc's rejection of top-down compute regulation can be reframed
  in x-risk's language. If regulatory capture means a frontier-safety monopoly
  chosen by political convenience rather than technical merit, then 'halt'
  becomes operationally indistinguishable from 'accelerate the politically
  favored lab.' Both camps oppose that outcome; they disagree about whether a
  non-captured halt is achievable.
