caveats:
- Regulators hold the duty even when the consequentialist calculus favors opacity;
  e/acc does not.
- This translation fails for pre-deployment approval regimes (EU AI Act Article 55),
  which regulators endorse on duty grounds and e/acc rejects on velocity grounds.
