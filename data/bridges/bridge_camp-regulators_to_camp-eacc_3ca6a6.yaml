translation: 'e/acc reads regulation as friction; regulators hold legibility as a
  duty independent of outcome. The translation e/acc can accept: auditable systems
  are *faster* to deploy in consequential domains because they survive litigation
  and public backlash that unauditable systems do not (cf. Raine, Garcia, Draft One
  audit failures). Legibility is infrastructure for deployment velocity, not a tax
  on it.'
