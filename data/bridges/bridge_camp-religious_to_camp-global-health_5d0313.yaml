translation: Religious traditions ground human dignity in transcendent sources; global-health
  philanthropy grounds suffering reduction in DALY aggregation. Both converge on 'AI
  as instrument for human persons, not replacement' --- which maps cleanly onto the
  global-health stance that AI should accelerate therapeutics and diagnostics rather
  than substitute for clinician-patient relationship (cf. Stanford LLM-therapy findings).
