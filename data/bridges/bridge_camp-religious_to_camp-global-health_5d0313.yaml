caveats:
- Religious camps will not endorse species-weighted aggregation that the EA wing of
  global-health sometimes uses; the human/non-human boundary is metaphysically loaded.
- Consequentialist tradeoffs (e.g., triage rationing) that global-health accepts may
  violate the non-substitutable-dignity constraint.
