quote: "OpenAI's $20 billion ARR is impressive for a company that barely had consumer\
  \ products three years ago, but it represents roughly 3% of the projected 2026 hyperscaler\
  \ capex total. Anthropic's $9 billion run rate, while showing 9x year-over-year\
  \ growth, occupies a similar position. The entire cohort of pure-play AI vendors\
  \ \u2013 including Cohere ($150 million ARR), Mistral (~$400 million), Perplexity\
  \ ($148 million annualized), and others \u2013 likely accounts for less than $35\
  \ billion in projected combined 2026 revenue."
