quote: The Stargate project, a joint venture between OpenAI, SoftBank, Oracle, and
  MGX, announced in January 2025 and backed by the Trump administration. The project
  targets $500 billion in AI infrastructure investment by 2029, with an initial $100
  billion deployment. As of September 2025, roughly 7 GW of capacity had been planned
  across five sites in Texas, New Mexico, and Ohio, with more than $400 billion in
  commitments within the first three years.
