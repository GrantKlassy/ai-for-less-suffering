quote: The straightforward regression yields a slope of 4.7x per year, and crosses
  1e26 FLOPs in November 2025. To establish confidence intervals on the slope of the
  fit and the time at which we expect open models to surpass a 1e26 FLOP threshold,
  we run a bootstrapping exercise (n=500), re-identifying top-1 frontier models for
  each sample. We find a median slope of 4.6x/year, with a 90% confidence interval
  of (3.6, 6.1).
