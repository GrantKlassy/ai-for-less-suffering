quote: Historically, training run duration has grown by 26% to 50% per year, but with
  many training runs now exceeding 100 days this growth rate seems less sustainable,
  as the rapid pace of innovation in AI creates demand for short iteration cycles.
  We anticipate a slowdown to 10-20% growth in duration per year through 2030.
