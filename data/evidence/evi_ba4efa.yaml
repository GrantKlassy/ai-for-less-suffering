quote: The update includes a new survey dataset from Pakistan, which results in an
  upward revision in the extreme poverty rate of the region in 2024 from 11.8 percent
  in the September 2025 data vintage to 14.4 percent in the March 2026 vintage. The
  increase results in an additional 21 million people living in extreme poverty in
  the region.
