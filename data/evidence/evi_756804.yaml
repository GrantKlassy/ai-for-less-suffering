quote: sub-Saharan Africa has 11 percent of the world's population and 24 percent
  of the global disease burden, yet only 3 percent of the world's health workers and
  less than 1 percent of global health expenditure. Nigeria, for example, has roughly
  one pathologist per 500,000 people, compared with a global average of one per 25,000.
