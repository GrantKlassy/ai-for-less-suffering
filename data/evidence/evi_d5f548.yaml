quote: Handheld digital X-ray devices use AI to stabilize the image. AI analysis of
  X-ray results enable high volume, high-quality screening for TB cases in even the
  poorest, most difficult contexts where doctors are in short supply and radiologists
  nonexistent. This isn't some vision of the future, but already reality in over 22
  countries where the Global Fund invests in TB programs.
