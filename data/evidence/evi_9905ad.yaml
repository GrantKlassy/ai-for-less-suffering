quote: Electricity demand from data centres in Ireland, for example, was 5.3 TWh in
  2022, equivalent to 17% of the country's total electricity consumption. The IEA
  has stated that 'at this pace, Ireland's data centres may double their electricity
  consumption by 2026, and with AI applications penetrating the market at a fast rate,
  we forecast the sector to reach a share of 32% of the country's total electricity
  demand in 2026'.
