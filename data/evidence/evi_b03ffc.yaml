quote: The company also introduced three new agents in Google Security Operations
  to help organizations defend against the malicious use of AI. These include a Threat
  Hunting agent that searches for novel attack patterns and stealthy adversary behaviors,
  a Detection Engineering agent that identifies coverage gaps and creates new detections
  for threat scenarios, and a Third-Party Context agent that enriches workflows with
  contextual data from third-party content.
