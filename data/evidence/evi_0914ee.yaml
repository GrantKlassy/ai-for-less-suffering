quote: Palantir has secured an enterprise agreement, or EA, from the U.S. Army to
  provide commercial software to warfighters. The EA consolidates 75 contracts into
  a single deal to ensure that required capabilities are delivered as soon as possible
  and to eliminate contract and reseller pass-through fees, the Army said Thursday.
