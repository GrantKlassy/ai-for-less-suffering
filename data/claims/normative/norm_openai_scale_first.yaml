axiom_detail: Scale-first consequentialism inferred from revealed behavior, not stated
  charter. The public position mirrors Anthropic's safety language; the deployment
  pattern (ChatGPT rollout, DevDay cadence, enterprise land-grab) prioritizes product
  velocity and user count as the primary feedback loop. Safety framing is applied
  retrospectively to ship decisions the commercial trajectory had already fixed.
axiom_family: consequentialist
created_at: '2026-04-17T00:00:00Z'
id: norm_openai_scale_first
kind: normative_claim
provenance_url: https://openai.com/blog/planning-for-agi-and-beyond
text: Broad, fast deployment of AI products at consumer and enterprise scale is itself
  the path to aligned AI --- scale produces the feedback, revenue, and institutional
  momentum that safety work depends on. Slowing deployment to wait for interpretability
  loses the information advantage that makes alignment tractable in the first place.
updated_at: '2026-04-17T00:00:00Z'
