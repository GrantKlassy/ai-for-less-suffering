axiom_detail: Distribution-as-freedom. Open weights treat AI as public infrastructure;
  gatekeeping a small number of labs is itself the structural harm, not the safeguard.
  Capability flows to more agents → more capability substrates across the population
  (Sen/Nussbaum capability-set argument, applied to cognition).
axiom_family: capabilities
created_at: '2026-04-17T00:00:00Z'
id: norm_open_weights_distribution
kind: normative_claim
provenance_url: https://about.fb.com/news/2023/07/llama-2/
text: AI model weights should be openly distributed as the default. Capability concentrated
  in a handful of closed labs is a greater structural harm than any hypothetical misuse
  enabled by open release. The burden of proof rests on restriction, not on distribution.
updated_at: '2026-04-17T00:00:00Z'
