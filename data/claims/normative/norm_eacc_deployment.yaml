axiom_detail: Techno-capital-first framing. Velocity of deployment is the primary
  moral variable; every quarter of deceleration is a quarter of averted goods (cures,
  cheaper energy, expanded capability) that did not arrive. Pauses, moratoria, and
  regulatory braking systematically underweight this opportunity cost.
axiom_family: e_acc
created_at: '2026-04-17T17:00:00Z'
id: norm_eacc_deployment
kind: normative_claim
provenance_url: https://a16z.com/the-techno-optimist-manifesto/
text: AI capability should be built and deployed as fast as capital, compute, and
  physics allow. Slowing is presumed harmful unless proven otherwise; the burden of
  proof rests on the brake, not the accelerator.
updated_at: '2026-04-17T17:00:00Z'
