id: norm_religious_human_dignity
kind: normative_claim
provenance_url: https://www.romecall.org/
text: Humans bear non-substitutable moral standing grounded in transcendent sources.
  AI systems are instruments that must serve human persons; any deployment that blurs
  the creator/creature distinction --- models marketed as equals, moral patients,
  or replacements for human relation --- violates a constraint that precedes and overrides
  consequentialist calculation.
