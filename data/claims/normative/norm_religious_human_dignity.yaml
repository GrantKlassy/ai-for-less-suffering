axiom_detail: Theological anthropology framing. Human moral standing is granted by
  a transcendent source (imago dei in Judeo-Christian tradition, khalifa/tawhid in
  Islamic tradition, equivalent concepts across faiths), not constructed by utilitarian
  aggregation. Applies across traditions that share a creator/creature distinction;
  the disagreement between traditions is on metaphysics, not on the policy output
  that AI systems must serve human persons rather than simulate or supplant them.
axiom_family: theological
created_at: '2026-04-17T17:00:00Z'
id: norm_religious_human_dignity
kind: normative_claim
provenance_url: https://www.romecall.org/
text: Humans bear non-substitutable moral standing grounded in transcendent sources.
  AI systems are instruments that must serve human persons; any deployment that blurs
  the creator/creature distinction --- models marketed as equals, moral patients,
  or replacements for human relation --- violates a constraint that precedes and
  overrides consequentialist calculation.
updated_at: '2026-04-17T17:00:00Z'
