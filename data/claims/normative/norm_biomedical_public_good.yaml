id: norm_biomedical_public_good
kind: normative_claim
provenance_url: null
text: Foundational biomedical research --- target discovery, mechanism, tool development ---
  is a durable public good whose compounding returns across decades justify sustained
  public funding independent of near-term product application; AI deployment inside
  this pipeline is suffering-reducing at a time horizon longer than most capital-extraction
  frames can price.
