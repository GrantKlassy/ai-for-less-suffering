axiom_detail: Legibility-before-deployment. Duty-based framing --- independent of
  expected outcomes, deploying systems whose behavior cannot be inspected, audited,
  or contested violates the consent conditions a democratic polity requires. Precaution
  follows from the duty, not from an expected-value calculation.
axiom_family: kantian
created_at: '2026-04-17T00:00:00Z'
id: norm_regulatory_legibility
kind: normative_claim
provenance_url: https://artificialintelligenceact.eu/
text: AI systems deployed in consequential domains must be legible to public institutions
  before deployment --- testable, auditable, contestable. Opacity at deployment is itself
  the harm; no outcome record substitutes for the upstream duty to make the system
  inspectable.
updated_at: '2026-04-17T00:00:00Z'
