text: Non-human animals with demonstrable capacity for suffering hold moral weight
  that must enter any serious suffering calculus at a non-trivial rate; the scale
  of contemporary factory farming makes animal suffering one of the largest numerator
  terms in any honest −suffering ranking regardless of the discount applied.
