axiom_detail: Creation-care and stewardship framing. Dominion-as-responsibility rather
  than dominion-as-exploitation; obligations to the non-human world grounded in theological
  tradition, not in consequentialist aggregation.
axiom_family: theological
created_at: '2026-04-17T00:00:00Z'
id: norm_ecological_stewardship
kind: normative_claim
provenance_url: null
text: Ecosystems and watersheds carry intrinsic moral standing independent of human
  welfare aggregation; harms to them are first-order wrongs, not costs to be offset
  by downstream benefit. AI buildout that drains an aquifer is not acceptable because
  the resulting model is useful.
updated_at: '2026-04-17T00:00:00Z'
