axiom_detail: Capabilities framing extended to environmental and community capabilities
  (Nussbaum, Sen). Human and community flourishing requires healthy watersheds, air,
  and land as preconditions --- not as aggregable utility but as capability-substrate.
axiom_family: capabilities
created_at: '2026-04-17T00:00:00Z'
id: norm_ecosystem_capabilities
kind: normative_claim
provenance_url: null
text: Watersheds, airsheds, and intact land are preconditions of human capability,
  not substitutable inputs. An intervention that degrades these substrates degrades
  the capability set of the communities that depend on them --- and no quantity of downstream
  flourishing-for-others can substitute.
updated_at: '2026-04-17T00:00:00Z'
