text: Marginal dollars spent on health interventions in low- and middle-income contexts
  (bednets, vaccines, therapeutics, treatment access) produce the highest ratio of
  suffering-averted to cost of any currently deployable intervention category; absent
  a specific reason to prefer another target, the default AI-for-suffering reallocation
  is toward accelerating this category.
