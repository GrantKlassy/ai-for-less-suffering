id: norm_creator_consent
kind: normative_claim
provenance_url: https://nytco-assets.nytimes.com/2023/12/NYT_Complaint_Dec2023.pdf
text: Training AI on copyrighted or personally-authored work without explicit consent
  or license is a rights violation, regardless of model output behavior. Authors and
  rights-holders must be able to opt in or out at the training-data layer, not only
  at the output layer.
