axiom_detail: Kantian universalizability extended to future persons. The duty is categorical,
  not contingent on expected-value calculations about how future people will benefit
  or suffer from today's compute buildout.
axiom_family: kantian
created_at: '2026-04-17T00:00:00Z'
id: norm_future_generations_duty
kind: normative_claim
provenance_url: null
text: Present actors owe future persons a non-foreclosed option set on water, extractive
  resources, and institutional governance. Compute expansion that forecloses future
  options --- depleted aquifers, exhausted mine-sites, locked-in vendor stacks --- fails
  a categorical duty even if it passes a consequentialist cost-benefit test.
updated_at: '2026-04-17T00:00:00Z'
