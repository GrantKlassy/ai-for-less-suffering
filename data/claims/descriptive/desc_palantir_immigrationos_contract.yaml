text: In April 2025, ICE entered a $30M sole-source contract with Palantir for ImmigrationOS,
  an augmentation of ICM intended to streamline apprehension of targets, monitor self-deportations
  and visa overstays in near real-time, and provide end-to-end logistical support
  from identification to removal, with a prototype scheduled for September 25, 2025
  delivery and the contract running through September 2027.
