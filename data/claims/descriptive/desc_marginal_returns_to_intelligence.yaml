text: 'Amodei proposes ''marginal returns to intelligence'' as the central analytic
  frame for powerful-AI impact, identifying five factors that bottleneck or complement
  intelligence: speed of the outside world, need for data, intrinsic complexity, constraints
  from humans (law/regulation/habit), and physical laws.'
