text: The letter signatories assert that ordinary whistleblower protections are insufficient
  for frontier AI risks because those protections focus on illegal activity while
  many AI risks of concern are not yet regulated, leaving confidentiality agreements
  and fear of retaliation as binding constraints on employee disclosure.
