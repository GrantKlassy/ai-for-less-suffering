text: PauseAI argues that as training costs fall (potentially to consumer-hardware
  levels), compute-based controls will become insufficient and should be supplemented
  by restrictions on publishing training-algorithm and runtime-efficiency breakthroughs,
  analogous to biosecurity controls on pathogen-enhancement research, plus limits
  on capability advances of hardware (lithography, chip design, photonic and quantum
  computing).
