text: 'Andreessen names as ''enemies'' of techno-optimism a specific cluster of concepts
  and movements: existential risk, sustainability, ESG, Sustainable Development Goals,
  stakeholder capitalism, the Precautionary Principle, trust and safety, tech ethics,
  risk management, de-growth, and limits-to-growth --- framing them as a six-decade
  ''mass demoralization campaign'' descended from Communist thought.'
