text: For autonomous weapon systems not subject to outright prohibition, the ICRC
  recommends regulation through a combination of limits on target types (constrained
  to military objectives by nature), limits on duration/geographic scope/scale of
  use, limits on situations of use (excluding presence of civilians), and requirements
  for human-machine interaction ensuring effective human supervision and timely intervention/deactivation.
