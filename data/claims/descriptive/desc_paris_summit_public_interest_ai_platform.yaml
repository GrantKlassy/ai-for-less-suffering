text: At the February 2025 Paris AI Action Summit, founding members Chile, Finland,
  France, Germany, India, Kenya, Morocco, Nigeria, Slovenia, and Switzerland launched
  a Public Interest AI Platform and Incubator to support digital public goods and
  capacity-building projects in data, model development, openness, audit, compute,
  talent, and financing.
