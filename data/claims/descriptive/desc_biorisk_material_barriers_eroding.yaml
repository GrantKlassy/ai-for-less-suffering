text: Material barriers that previously served as passive biodefense --- including
  the cost of nucleic acid synthesis, reagent kit standardization, and access to standard
  molecular biology equipment such as PCR machines --- have been eroding independent
  of AI, making material acquisition less of a bottleneck for would-be biological
  attackers.
