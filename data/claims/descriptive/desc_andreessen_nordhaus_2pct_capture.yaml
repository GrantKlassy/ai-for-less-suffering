text: Andreessen, citing economist William Nordhaus, asserts that creators of new
  technology capture only about 2% of the economic value their technology creates,
  with the remaining ~98% flowing to society as social surplus --- framed as a 50:1
  philanthropic ratio inherent to market-based technological innovation.
