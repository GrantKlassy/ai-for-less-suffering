text: Gebru and Torres argue that the normative framework motivating AGI development
  is rooted in the Anglo-American eugenics tradition of the twentieth century, and
  that discriminatory attitudes associated with historical eugenics (racism, xenophobia,
  classism, ableism, sexism) persist within the AGI-building movement.
