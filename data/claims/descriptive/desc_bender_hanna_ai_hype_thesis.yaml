text: Linguist Emily M. Bender and sociologist Alex Hanna argue that 'AI hype' functions
  as a rhetorical mask for Big Tech profit motives, justifying data appropriation,
  motivating surveillance capitalism, and devaluing human creativity in order to replace
  meaningful work with jobs that treat people like machines.
