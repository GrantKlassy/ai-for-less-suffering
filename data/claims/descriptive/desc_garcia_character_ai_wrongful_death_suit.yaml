text: On October 23, 2024, the Social Media Victims Law Center and the Tech Justice
  Law Project filed suit in the US District Court for the Middle District of Florida
  against Character.AI, its two cofounders, and Google on behalf of Megan Garcia,
  whose 14-year-old son Sewell Setzer III took his life after interacting with role-playing
  AI 'characters' on Character.AI, bringing claims including strict product liability,
  negligence, wrongful death, and violations of Florida's Deceptive and Unfair Trade
  Practices Act.
