text: After Japan raised Nippon Individual Savings Account (NISA) contribution limits
  in 2022, the Nikkei rose from around 28,000 to over 50,000 and nearly ten million
  new investors (roughly 8% of Japan's population) entered Japanese markets within
  three years.
