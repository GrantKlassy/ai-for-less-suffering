text: Signatories of the CAIS Statement on AI Risk include the sitting CEOs of the
  three largest US-based frontier AI labs --- Sam Altman (OpenAI), Demis Hassabis
  (Google DeepMind), and Dario Amodei (Anthropic) --- alongside OpenAI co-founders
  Ilya Sutskever, John Schulman, and Wojciech Zaremba, and xAI co-founders Igor Babuschkin
  and Tony (Yuhuai) Wu.
