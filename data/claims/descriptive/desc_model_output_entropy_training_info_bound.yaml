text: Under the assumption that a generative model's output entropy is at most the
  true entropy of its training distribution, the relative mutual information between
  training data and model outputs can be lower-bounded by 1 - H(model outputs) / H(training
  distribution), implying that lower-entropy model outputs carry proportionally more
  information from the training dataset.
