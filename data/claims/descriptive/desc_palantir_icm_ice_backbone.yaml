text: Palantir has operated ICE's Investigative Case Management (ICM) platform since
  2014 under a sole-source arrangement extended through at least April 2026, with
  cumulative contract value exceeding $145M; ICM integrates data from FBI, DEA, ATF,
  and SEVIS and supports both case tracking and investigative research to build cases
  against individuals, including US citizens.
