text: Historically, general-purpose technologies such as electricity and computers
  produced measurable macroeconomic productivity impacts roughly one to three decades
  after the underlying technological capability first emerged, because complementary
  inventions, capital investment, worker retraining, and organizational/process redesign
  are slow-moving.
