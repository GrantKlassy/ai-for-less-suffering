text: The January 23, 2025 executive order directs the Assistant to the President
  for Science and Technology, the Special Advisor for AI and Crypto, and the APNSA,
  in coordination with other White House offices and agency heads, to develop and
  submit an AI Action Plan to the President within 180 days to achieve US global AI
  dominance.
