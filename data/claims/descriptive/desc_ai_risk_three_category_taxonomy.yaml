text: 'The International AI Safety Report classifies general-purpose AI risks into
  three categories: risks from malicious use (fake content, manipulation, cyber offence,
  bio/chem attacks), risks from malfunctions (reliability, bias, loss of control),
  and systemic risks (labour markets, AI R&D divide, market concentration, environmental,
  privacy, copyright).'
