text: Thermoelectric power generation (coal, gas, nuclear) remains the largest category
  of US water withdrawal. Every additional MWh of grid-backed AI load embeds an indirect
  water draw on top of the direct cooling water at the datacenter --- often overlooked
  when AI water impact is discussed only in terms of on-site cooling.
