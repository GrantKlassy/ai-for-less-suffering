text: Hendrycks, Schmidt, and Wang propose Mutual Assured AI Malfunction (MAIM) as
  a deterrence regime analogous to nuclear MAD, in which any state's aggressive bid
  for unilateral AI dominance is met with preventive sabotage --- ranging from covert
  cyberattacks to potential kinetic strikes on datacenters --- by rival states.
