text: The same January 20, 2025 order revoked Biden-era climate and clean-energy executive
  orders including EO 14008 (Tackling the Climate Crisis at Home and Abroad), EO 14030
  (Climate-Related Financial Risk), EO 14037 (American Leadership in Clean Cars and
  Trucks), EO 14057 (Catalyzing Clean Energy Industries and Jobs Through Federal Sustainability),
  and EO 14082 (Implementation of the Energy Provisions of the Inflation Reduction
  Act).
