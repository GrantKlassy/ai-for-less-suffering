text: Published bottom-up task-based forecasts of AI's annual productivity growth
  contribution span roughly 0.2 to 3.3 percentage points (McKinsey through 2040, with
  0.1-0.6pp attributed to generative AI) and 0.3 to 2.9 percentage points (Goldman
  Sachs during the adoption period), against a baseline US annual productivity growth
  of ~1.5%.
