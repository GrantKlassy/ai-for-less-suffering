text: 'The Frontier Safety Framework has three components: identifying Critical Capability
  Levels in high-risk domains, running periodic ''early warning evaluations'' on frontier
  models to detect approach to those levels, and applying tailored security (anti-exfiltration)
  and deployment (anti-misuse) mitigations when thresholds are crossed.'
