text: The order revoked the core Biden-era COVID-19 executive orders, including EO
  13987 (Unified COVID-19 Response), EO 13995 (Equitable Pandemic Response), EO 13996
  (COVID-19 Pandemic Testing Board), EO 13997 (Access to COVID-19 Care and Treatments),
  EO 14002 (Economic Relief Related to COVID-19), and EO 14099 (Moving Beyond COVID-19
  Vaccination Requirements for Federal Workers).
