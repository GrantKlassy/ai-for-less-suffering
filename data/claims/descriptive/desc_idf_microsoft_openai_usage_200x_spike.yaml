text: Per AP review of internal company data, Israeli military usage of Microsoft
  and OpenAI AI services spiked in March 2024 to nearly 200 times the level of the
  week preceding the October 7, 2023 Hamas attack, and data stored on Microsoft servers
  doubled between that period and July 2024 to more than 13.6 petabytes.
