text: 'Applying the same O*NET task-exposure methodology to past technology waves
  yielded markedly different labor outcomes for equivalent exposure levels: moving
  an occupation from the 25th to 75th percentile of exposure was associated with 9-18%
  within-industry employment share declines and 8-14% wage declines for robotics,
  versus 7-11% employment share declines and 2-6% wage declines for software.'
