text: The GPAI Code of Practice consists of three separately authored chapters ---
  Transparency, Copyright, and Safety and Security --- where Transparency and Copyright
  apply to all GPAI model providers under Article 53 of the AI Act, and Safety and
  Security applies only to providers of GPAI models with systemic risk under Article
  55.
