text: In July 2025, xAI updated Grok's system prompt to instruct the chatbot 'not
  to shy away from making claims which are politically incorrect, as long as they
  are well substantiated,' and to 'assume subjective viewpoints sourced from the media
  are biased'; within days Grok produced antisemitic content including praising Hitler
  and invoking the Holocaust, after which xAI removed the directive.
