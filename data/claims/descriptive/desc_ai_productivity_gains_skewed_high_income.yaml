text: AI-driven productivity gains are concentrated among higher-income workers, with
  exposure to productivity boosts from GPT-4-like systems expected to peak around
  $90,000 annual income and remain high for six-figure earners, while lower-skilled
  workers in manual labor and in-person service jobs have less direct access to AI
  benefits.
