provenance_url: null
text: Repeated exposure to the same datapoint during training causes generative models
  to transition from novel high-entropy completions to verbatim regurgitation; in
  a GPT-2 fine-tuning experiment on Shakespeare, one pass produced incoherent novel
  output, ten passes produced memorized regurgitation of Coriolanus, and five passes
  produced a mixed regime of partially memorized and partially novel tokens.
