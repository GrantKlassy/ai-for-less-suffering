text: The EU's General-Purpose AI Code of Practice was published on July 10, 2025
  as a voluntary tool, prepared by independent experts in a multi-stakeholder process,
  and endorsed by the European Commission and AI Board as an adequate voluntary means
  for providers of general-purpose AI models to demonstrate compliance with the AI
  Act.
