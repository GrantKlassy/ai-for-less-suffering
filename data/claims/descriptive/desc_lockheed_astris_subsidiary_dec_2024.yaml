text: On December 16, 2024, Lockheed Martin announced the formation of Astris AI,
  a subsidiary tasked with offering Lockheed Martin's internal MLOps software platform
  (AI Factory), generative AI platform, and AI engineering consulting externally to
  the US defense industrial base and commercial high-assurance sectors.
