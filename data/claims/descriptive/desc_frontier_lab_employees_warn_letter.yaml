text: 'In June 2024, current and former employees of frontier AI companies published
  an open letter calling on advanced AI companies to commit to four principles: no
  non-disparagement agreements covering risk-related concerns, a verifiably anonymous
  internal reporting process, a culture permitting risk-related criticism to regulators
  and the public, and no retaliation against employees who publicly share risk-related
  confidential information after other processes have failed.'
