text: The PRISM Trial (Pragmatic Randomized Trial of Artificial Intelligence for Screening
  Mammography) is a multi-institutional clinical trial supported by a $16 million
  award from the Patient-Centered Outcomes Research Institute to evaluate whether
  AI can help radiologists interpret mammograms more accurately.
