text: PauseAI's treaty proposal centers on an International AI Safety Agency (AISA)
  modeled on the IAEA, with authority to approve major AI training runs and deployments,
  specify oversight requirements, and verify compliance through mechanisms including
  GPU tracking, energy monitoring, datacenter inspections, semiconductor-fab inspections,
  chip location tracking, chip-based reporting, whistleblower incentives, and financial
  intelligence.
