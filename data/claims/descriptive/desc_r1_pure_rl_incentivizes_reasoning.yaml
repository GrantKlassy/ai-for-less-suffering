text: DeepSeek's R1 work demonstrates that LLM reasoning abilities can be incentivized
  through pure reinforcement learning without human-labeled reasoning trajectories,
  with the RL-trained model outperforming counterparts trained via conventional supervised
  learning on human demonstrations for verifiable tasks in mathematics, coding competitions,
  and STEM fields.
