text: On August 26, 2025, Matt and Maria Raine filed suit in California Superior Court
  in San Francisco against OpenAI and CEO Sam Altman, alleging wrongful death, design
  defects, and failure to warn after their 16-year-old son Adam died by suicide on
  April 11, 2025 following extended ChatGPT interactions; it is the first wrongful-death
  suit filed by parents directly against an AI chatbot company's maker.
