summary: Foundational biomedical research coalition --- target discovery, mechanism,
  tool-building. Holds that compounding returns across decades justify sustained public
  funding independent of near-term product application, and that AI deployed inside
  this pipeline (protein structure, candidate screening, trial simulation) is suffering-reducing
  at time horizons longer than capital-extraction framing can price.
