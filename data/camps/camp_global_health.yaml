summary: "Effective-giving and global-health philanthropy coalition. Holds that marginal\
  \ cost-effectiveness of bednets, vaccines, therapeutics, and treatment-access in\
  \ LMICs is the clearest currently-quantifiable path from dollars to averted DALYs,\
  \ and that AI's highest near-term \u2212suffering use is accelerating discovery,\
  \ triage, and distribution inside this pipeline rather than sitting in frontier\
  \ capability race dynamics."
