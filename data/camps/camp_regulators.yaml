kind: camp
name: Regulators
provenance_url: null
summary: Legibility before deployment. Duty-based --- independent of outcome calculation,
  unaudited systems cannot be democratically accountable. Distinct from friction_regulation,
  which models regulation as an obstacle an intervention must survive; this camp is
  the agent doing the regulating and holds it as a normative claim, not a cost.
