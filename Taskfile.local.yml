version: "3"

# Repo-local tasks for ai-for-less-suffering. Loaded under `local:` namespace
# by the standard Taskfile.yml. Invoke with `task local:<name>`.

tasks:
  # Invoked by the standard check: fan-out at the end of `task check`.
  check:
    desc: Run repo-local checks (invoked after standard checks)
    cmds:
      - task: check:canary

  ship:
    desc: Pre-deploy gate + signed ship tag + push. Kills gpg-agent so the tag signs with a fresh passphrase --- shipping is a deliberate human act.
    cmds:
      - task: check
      - task: site:check
      - task: build
      - gpgconf --kill gpg-agent 2>/dev/null || true
      - git tag -s "ship/$(date -u +%Y%m%dT%H%M%SZ)" -m "ship"
      - git push --follow-tags

  check:canary:
    desc: Verify canary.txt signature is valid (catches stale signatures from edits without re-sign)
    cmds:
      - |
        if [ ! -f public/canary.txt ] || [ ! -f public/canary.txt.asc ]; then
          echo "ERROR: canary files missing"
          exit 1
        fi
        if ! gpg --verify public/canary.txt.asc public/canary.txt 2>&1 | grep -q "Good signature"; then
          echo "ERROR: canary signature does not verify --- canary.txt was modified without re-signing"
          echo "  fix: task local:canary:renew"
          exit 1
        fi
        echo "OK: canary signature verifies"

  canary:renew:
    desc: Rewrite canary.txt with today's date + current BTC block, sign, verify
    cmds:
      - scripts/renew-canary.sh

  dev:
    desc: Run the Astro dev server with HMR (http://localhost:4321)
    cmds:
      - pnpm dev

  build:
    desc: Build the Astro site to dist/
    cmds:
      - pnpm build

  preview:
    desc: Preview the built site locally
    cmds:
      - pnpm preview

  site:check:
    desc: Astro TypeScript check and prettier format check
    cmds:
      - pnpm check
      - pnpm format:check
